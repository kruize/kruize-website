<!-- Kruize Header Navigation -->
<div class="kruize-header">
    <a href="https://kruize.github.io/kruize-website"><img src="{{ "images/kruize-icon.png" | relative_url }}" alt="Kruize Logo" class="logo"></a>
    <div class="nav">
        <a href="{{ "/" | relative_url }}">Docs</a>
        <a href="#">Demos</a>
        <a href="{{ "/kruize_blogs.html" | relative_url }}">Blogs</a>
        <a id="tg-sb-link" href="#"><i id="tg-sb-icon" class="fa fa-toggle-on"></i> Nav</a>
        <div class="icons">
            <a href="https://github.com/kruize/autotune" target="_blank" rel="noopener">
                <img src="{{ "images/github-icon.png" | relative_url }}" alt="GitHub">
            </a>
            <a href="https://join.slack.com/t/kruizeworkspace/shared_invite/zt-2i2bs72qr-mfJU3uqcWXXSUv~O0~rbog" target="_blank" rel="noopener">
                <img src="{{ "images/slack-icon.png" | relative_url }}" alt="Slack">
            </a>
        </div>
    </div>
</div>

<!-- Search functionality (moved below header) -->
<div style="padding: 10px 20px; background: #f8f8f8; border-bottom: 1px solid #ddd;">
    <div id="search-demo-container" style="max-width: 300px;">
        <input type="text" id="search-input" placeholder="{{site.data.strings.search_placeholder_text}}" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <ul id="results-container"></ul>
    </div>
    <script src="{{ "js/jekyll-search.js"}}" type="text/javascript"></script>
    <script type="text/javascript">
            SimpleJekyllSearch.init({
                searchInput: document.getElementById('search-input'),
                resultsContainer: document.getElementById('results-container'),
                dataSource: '{{ "search.json" }}',
                searchResultTemplate: '<li><a href="{url}" title="{{page.title | escape }}">{title}</a></li>',
                noResultsText: '{{site.data.strings.search_no_results_text}}',
                limit: 10,
                fuzzy: true,
            })
    </script>
</div>
